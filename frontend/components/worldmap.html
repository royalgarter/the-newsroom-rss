<div id="world_map_dashboard" x-show="showWorldMap" class="fixed inset-0 z-[150] bg-white dark:bg-black overflow-auto p-4 flex flex-col font-mono"
    @keydown.escape.window="showWorldMap = false"
    x-data="{
        svgDoc: null,
        centroids: {},
        hoverCountry: null,
        ready: false,
        initMap() {
            this.ready = false;
            fetch('/components/worldmap.svg')
                .then(r => r.text())
                .then(svgText => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(svgText, 'image/svg+xml');
                    const svg = doc.querySelector('svg');
                    
                    // Clean up some styles for better integration
                    const style = svg.querySelector('style');
                    if (style) {
                        style.textContent += `
                            #background { fill: transparent !important; }
                            .landxx { fill: #e1e0d0; stroke: #c3c1a1; transition: fill 0.2s; }
                            .dark .landxx { fill: #1a1a1a; stroke: #333; }
                            .landxx:hover { fill: #2b7fff !important; cursor: pointer; }
                            .has-news { fill: #d1e4ff !important; }
                            .dark .has-news { fill: #002d66 !important; }
                            text { pointer-events: none; font-family: monospace; }
                            .dark text { fill: #888 !important; }
                        `;
                    }

                    // Extract centroids from labels
                    const labels = doc.querySelectorAll('#labels text');
                    labels.forEach(text => {
                        const id = text.id.replace('txt-', '');
                        const x = parseFloat(text.getAttribute('x'));
                        const y = parseFloat(text.getAttribute('y'));
                        if (!isNaN(x) && !isNaN(y)) {
                            this.centroids[id] = { x, y };
                        }
                    });

                    // Add IDs and classes to paths for highlighting
                    this.countryClusters.forEach(c => {
                        const path = doc.getElementById(c.code.toLowerCase());
                        if (path) {
                            path.classList.add('has-news');
                        }
                    });

                    const container = document.getElementById('map-svg-container');
                    container.innerHTML = '';
                    container.appendChild(svg);
                    
                    // Add interactivity
                    svg.addEventListener('mouseover', (e) => {
                        const path = e.target.closest('path');
                        if (path && path.id && path.id.length === 2) {
                            this.hoverCountry = path.id.toUpperCase();
                        }
                    });
                    svg.addEventListener('mouseout', () => { this.hoverCountry = null; });
                    this.ready = true;
                });
        }
    }"
    x-init="initMap()"
>
    <div class="flex justify-between items-center mb-4 border-b pb-2">
        <h2 class="text-2xl font-bold">[World Map Dashboard]</h2>
        <div class="flex gap-4">
            <button @click="clusterByCountry(); initMap();" class="border px-4 py-2 font-bold cursor-pointer hover:underline">[Recalculate]</button>
            <button @click="showWorldMap = false; location.hash = '#home'" class="border px-4 py-2 font-bold cursor-pointer hover:underline">[Close]</button>
        </div>
    </div>

    <!-- Map Container -->
    <div class="relative w-full border bg-blue-50 dark:bg-blue-900/10 overflow-hidden shadow-inner min-h-[500px]">
        <div id="map-svg-container" class="w-full h-full">
            <!-- SVG will be injected here -->
            <div class="flex items-center justify-center h-[500px] animate-pulse">
                [Loading World Map...]
            </div>
        </div>

        <!-- Floating Info Box -->
        <div x-show="hoverCountry" class="absolute top-4 right-4 p-4 border bg-white/90 dark:bg-black/90 z-20 shadow-lg min-w-[200px]" x-cloak>
            <template x-if="hoverCountry">
                <div>
                    <div class="flex items-center gap-2 border-b mb-2 pb-1">
                        <img :src="'https://flagcdn.com/24x18/' + hoverCountry.toLowerCase() + '.png'" class="border shadow-sm">
                        <span class="font-bold text-lg" x-text="hoverCountry"></span>
                    </div>
                    <div class="text-sm">
                        <template x-data="{ cluster: countryClusters.find(c => c.code === hoverCountry) }" x-if="cluster">
                            <div>
                                <div class="font-bold text-blue-600 dark:text-blue-400 mb-2" x-text="cluster.count + ' articles found'"></div>
                                <ul class="space-y-1">
                                    <template x-for="item in cluster.items.slice(0, 5)" :key="item.link">
                                        <li class="truncate text-xs" x-text="'• ' + item.title"></li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                        <template x-if="!countryClusters.find(c => c.code === hoverCountry)">
                            <div class="italic opacity-50">No articles for this region.</div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <!-- Proportional Circles (Overlays) -->
        <!-- We use the same viewBox as the SVG (2754 1398) to position them -->
        <template x-if="ready">
            <svg viewBox="0 0 2754 1398" class="absolute inset-0 w-full h-full pointer-events-none z-10">
                <template x-for="c in countryClusters" :key="c.code">
                    <template x-if="centroids[c.code.toLowerCase()]">
                        <g class="pointer-events-auto cursor-pointer group" 
                        @click="toast(c.name + ': ' + c.count + ' articles')">
                            <circle 
                                :cx="centroids[c.code.toLowerCase()].x" 
                                :cy="centroids[c.code.toLowerCase()].y - 10" 
                                :r="Math.sqrt(c.count) * 15 + 10" 
                                class="fill-blue-500/40 stroke-blue-600 hover:fill-blue-500/60 transition-all"
                            />
                            <text 
                                :x="centroids[c.code.toLowerCase()].x" 
                                :y="centroids[c.code.toLowerCase()].y - 10" 
                                text-anchor="middle" 
                                dominant-baseline="middle"
                                class="text-[20px] font-bold fill-black dark:fill-white pointer-events-none"
                                x-text="c.count"
                            ></text>
                        </g>
                    </template>
                </template>
            </svg>
        </template>
    </div>

    <!-- Country Stats & Links -->
    <div class="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20">
        <template x-for="c in countryClusters" :key="c.code">
            <div class="border p-4 bg-gray-50/50 dark:bg-gray-900/20 hover:border-blue-500 transition-colors">
                <h3 class="text-lg font-bold border-b mb-3 flex justify-between items-center">
                    <span>
                        <img width="16" height="12" class="inline mr-2" :src="'https://flagcdn.com/16x12/' + c.code.toLowerCase() + '.png'" onerror="this.style.display='none'">
                        <span x-text="c.name"></span>
                    </span>
                    <span class="bg-blue-500 text-white px-2 py-0.5 text-xs rounded" x-text="c.count"></span>
                </h3>
                <div class="space-y-3">
                    <template x-for="item in c.items.slice(0, 5)" :key="item.link">
                        <div class="group">
                            <a :href="item.link" target="_blank" class="text-sm hover:underline font-semibold block leading-tight mb-1" x-text="item.title"></a>
                            <div class="flex justify-between items-center text-[10px] opacity-60">
                                <span x-text="new URL(item.link).hostname.replace('www.', '')"></span>
                                <span x-text="item.published_formatted"></span>
                            </div>
                        </div>
                    </template>
                </div>
                <template x-if="c.items.length > 5">
                    <div class="mt-4 pt-2 border-t text-center">
                        <span class="text-xs italic opacity-50" x-text="'+ ' + (c.count - 5) + ' more articles'"></span>
                    </div>
                </template>
            </div>
        </template>
    </div>
</div>
